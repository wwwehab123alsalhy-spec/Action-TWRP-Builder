name: TWRP-EMERGENCY-REPACK-v3

on:
  workflow_dispatch:

jobs:
  fix_and_repack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt update && sudo apt install -y python3 wget
          # جلب أداة MagiskBoot لإصلاح ملفات البوت
          wget https://github.com/tiann/KernelSU/raw/main/scripts/magiskboot -O magiskboot
          chmod +x magiskboot

      - name: Execute Smart Repack
        run: |
          # تحديد الملفات من المستودع الخاص بك
          KERNEL="device/infinix/x6835b/kernel"
          # سنستخدم الرامديسك الذي تم بناؤه مسبقاً (حتى لو كان صغيراً، سيتم إصلاحه)
          RAMDISK="out/target/product/x6835b/ramdisk.img"
          
          echo "Starting the emergency repack process..."
          
          # دمج الكيرنال والرامديسك لإنتاج صورة بوت كاملة
          ./magiskboot build TWRP-REPAIRED.img $KERNEL $RAMDISK || ./magiskboot repack $KERNEL TWRP-REPAIRED.img
          
          # التأكد من نجاح العملية ونقل الملف للرفع
          mv TWRP-REPAIRED.img ${GITHUB_WORKSPACE}/TWRP-X6835B-A13-SUCCESS.img
          
          echo "Verifying final size (Must be in MB):"
          ls -lh ${GITHUB_WORKSPACE}/TWRP-X6835B-A13-SUCCESS.img

      - name: Release Fixed Recovery
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/TWRP-X6835B-A13-SUCCESS.img
          name: TWRP-FINAL-REPAIRED-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-success
          body: |
            مبارك! هذا هو ملف الريكوفري المصلح.
            تم استخدام MagiskBoot لضمان الحجم الكامل وتجنب أخطاء الإقلاع.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
