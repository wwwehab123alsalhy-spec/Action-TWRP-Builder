name: Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "NicoLYDX20"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree (Auth-Link)
        run: |
          cd workspace
          # وضعنا رابط المستودع مباشرة لضمان عدم حدوث خطأ في الخانات
          git clone --depth=1 https://github.com/nicolas-v/twrp_infinix_x6835b.git device/infinix/x6835b
        working-directory: .

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Building recovery
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng || lunch x6835b-eng
          make clean
          make recoveryimage -j$(nproc --all)
          # هذا السطر يبحث عن الـ img وينسخه فوراً لرفعه
          cp out/target/product/x6835b/recovery.img ${GITHUB_WORKSPACE}/ || find out/target/product/ -name "*.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/*.img
          name: TWRP-Infinix-x6835b-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: "تفضل، هذا هو ملف الـ img الخاص بجهازك."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
