name: TWRP-FULL-SOURCE-BUILD-A13

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Install Repo Tool
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize and Sync Source
        run: |
          mkdir workspace
          cd workspace
          # استخدام سورس 12.1 لبناء ريكوفري متوافق مع أندرويد 13
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          # التحميل الكامل (قد يستغرق أكثر من ساعة)
          repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Clone Device Tree
        run: |
          cd workspace
          git clone https://github.com/wehab123alsalhy-spec/Action-TWRP-Builder.git device/infinix/x6835b

      - name: Build TWRP Recovery
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          # بناء الريكوفري الفعلي من الأكواد
          lunch twrp_x6835b-eng
          make recoveryimage -j$(nproc)

      - name: Final Repack with MagiskBoot
        run: |
          cd workspace
          # جلب أداة magiskboot لدمج الكيرنال الأصلي مع الرامديسك الجديد
          wget https://github.com/magisk-modules-alt-repo/magiskboot_ndk/raw/main/bin/x86_64/magiskboot
          chmod +x magiskboot
          ./magiskboot build TWRP-X6835B-A13-REAL.img device/infinix/x6835b/kernel out/target/product/x6835b/ramdisk.img
          cp TWRP-X6835B-A13-REAL.img ${GITHUB_WORKSPACE}/

      - name: Upload Real Recovery
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-A13-REAL.img
          name: TWRP-REAL-BUILD-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-real
          body: |
            تم البناء من السورس الكامل (Full Source Build).
            هذا الملف يحتوي على توقيع أندرويد الحقيقي وجاهز للتفليش.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
