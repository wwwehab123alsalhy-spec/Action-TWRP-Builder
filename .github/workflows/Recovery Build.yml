name: TWRP-X6835B-FIX-VENDOR-CONFLICT

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop pngcrush rsync zip zlib1g-dev libssl-dev

      - name: Sync Source
        run: |
          mkdir ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo && chmod a+x ~/bin/repo
          export PATH=$PATH:~/bin
          mkdir workspace && cd workspace
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Clone and Clean Device Tree
        run: |
          cd workspace
          git clone https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b-.git device/infinix/x6835b
          # حل مشكلة الفشل عند 99%: حذف المجلدات التي تسبب تعارض الروابط الرمزية
          rm -rf device/infinix/x6835b/recovery/root/vendor
          rm -rf device/infinix/x6835b/recovery/root/system

      - name: Build Integrated Boot
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          # بناء البوت المدمج لتجنب خطأ الريكوفري المنفصل
          make bootimage -j$(nproc)

      - name: Export and Pad Image
        run: |
          # البحث عن الملف الناتج ورفعه
          find workspace/out/target/product/x6835b/ -name "boot.img" -exec cp {} TWRP-X6835B-BOOT.img \;
          # ضمان حجم 32MB كما يتطلب انفنكس
          truncate -s 32M TWRP-X6835B-BOOT.img

      - name: Final Release
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-BOOT.img
          name: TWRP-FINAL-FIXED-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-fixed
          body: |
            تم حل مشكلة تعارض المجلدات (Vendor Conflict).
            هذا الملف هو Boot Image مدمج بالريكوفري.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
