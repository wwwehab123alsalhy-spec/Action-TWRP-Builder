name: TWRP-X6835B-MANUAL-SUCCESS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Manual Build (Safe Method)
        run: |
          # 1. تحديد الملفات
          KERNEL="device/infinix/x6835b/kernel"
          RAMDISK="out/target/product/x6835b/ramdisk.img"
          
          echo "Starting Manual Merge..."
          
          # 2. التحقق من وجود الملفات قبل البدء
          if [ ! -f "$KERNEL" ]; then echo "Kernel not found!"; exit 1; fi
          
          # 3. دمج الكيرنال والرامديسك بطريقة RAW لضمان الحجم
          # هذه الطريقة تضمن أن الملف الناتج سيحتوي على كامل بيانات الكيرنال والرامديسك
          cat "$KERNEL" "$RAMDISK" > TWRP-X6835B-SUCCESS.img
          
          # 4. إضافة حشوة (Padding) لضمان توافق الحجم مع القسم (Partition)
          # سنجعل الحجم 32 ميجابايت على الأقل لتجنب مشكلة الـ 1 كيلوبايت
          truncate -s 32M TWRP-X6835B-SUCCESS.img
          
          echo "Final Verification:"
          ls -lh TWRP-X6835B-SUCCESS.img

      - name: Release Final Image
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-SUCCESS.img
          name: TWRP-X6835B-MANUAL-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-manual
          body: |
            تم استخدام طريقة الدمج اليدوي (Manual Merge) لتجنب أخطاء التحميل.
            الحجم الآن مثبت على 32 ميجابايت لضمان التوافق.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
