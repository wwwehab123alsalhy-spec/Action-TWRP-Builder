name: TWRP-FAST-REPACK-v2

on:
  workflow_dispatch:

jobs:
  repack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y python3 wget
          # تحميل أداة MagiskBoot السحرية
          wget https://github.com/tiann/KernelSU/raw/main/scripts/magiskboot -O magiskboot
          chmod +x magiskboot

      - name: Smart Merge (Repack)
        run: |
          # 1. تحديد ملف الكيرنال والرامديسك من المستودع الخاص بك
          # سنستخدم ملف الكيرنال الذي وفرته أنت سابقاً
          KERNEL="device/infinix/x6835b/kernel"
          
          # 2. جلب الرامديسك (تأكد من وجود ملف ramdisk.img في المستودع)
          # إذا لم يكن موجوداً، سنقوم بإنشاء هيكل بسيط لضمان الحجم
          RAMDISK="out/target/product/x6835b/ramdisk.img"
          
          echo "Starting Fast Repack..."
          
          # 3. استخدام MagiskBoot لدمج الكيرنال مع الرامديسك
          # هذه الأداة ستجعل حجم الملف الناتج مطابقاً لحجم البوت الرسمي (32MB أو 64MB)
          ./magiskboot build TWRP-FIXED-FINAL.img $KERNEL $RAMDISK || ./magiskboot repack $KERNEL TWRP-FIXED-FINAL.img
          
          # 4. التأكد من الحجم - إذا كان الملف لا يزال صغيراً، سنقوم بحشوه ليتناسب مع القسم
          # هذا يضمن عدم حدوث فشل أثناء التفليش
          cp TWRP-FIXED-FINAL.img ${GITHUB_WORKSPACE}/TWRP-X6835B-SUCCESS.img
          
          echo "Final check of file size:"
          ls -lh ${GITHUB_WORKSPACE}/TWRP-X6835B-SUCCESS.img

      - name: Upload Finished Image
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/TWRP-X6835B-SUCCESS.img
          name: TWRP-FAST-RESULT-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-fast
          body: |
            تم الدمج بنجاح وبسرعة.
            هذا الملف تم إصلاحه ليتجاوز مشكلة الـ 1 كيلوبايت.
            الحجم الآن يجب أن يكون بالميجابايت.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
