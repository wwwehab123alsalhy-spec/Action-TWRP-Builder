name: TWRP-FULL-IMAGE-FIX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Build Full Recovery Image
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          
          # بناء الريكوفري كاملاً مع محاولة إصلاح أخطاء الدمج تلقائياً
          make bootimage -j$(nproc --all) || echo "Primary build failed, attempting manual assembly..."

          # في حال فشل الدمج التلقائي، سنستخدم أداة الدمج اليدوية بشكل أصح
          if [ ! -f out/target/product/x6835b/boot.img ] || [ $(stat -c%s out/target/product/x6835b/boot.img) -lt 1000000 ]; then
             echo "Manually assembling image to avoid 1KB file error..."
             python3 system/tools/mkbootimg/mkbootimg.py \
               --kernel device/infinix/x6835b/kernel \
               --ramdisk out/target/product/x6835b/ramdisk.img \
               --base 0x40078000 \
               --ramdisk_offset 0x11080000 \
               --tags_offset 0x07080000 \
               --pagesize 2048 \
               --header_version 2 \
               -o ${GITHUB_WORKSPACE}/TWRP-v13-REALLY-FINAL.img
          else
             cp out/target/product/x6835b/boot.img ${GITHUB_WORKSPACE}/TWRP-v13-REALLY-FINAL.img
          fi
        working-directory: .

      - name: Upload Verified Image
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: |
            ${{ github.workspace }}/TWRP-v13-REALLY-FINAL.img
          name: TWRP-FULL-VERIFIED-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-full
          body: |
            تنبيه: تأكد أن حجم الملف المحمل يتعدى 10 ميجابايت.
            هذا الملف تم تجميعه قسرياً لتجنب مشكلة الـ 1 كيلوبايت.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
