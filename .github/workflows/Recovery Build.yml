name: TWRP-FINAL-RECOVERY-BUILDER

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Build Ramdisk and Merge Boot
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          
          # 1. بناء الرامديسك (عقل الريكوفري)
          make ramdisk -j$(nproc --all)

          # 2. عملية الدمج اليدوي المصححة (Manual Merge)
          # استخدمنا الأوامر التي تدعمها نسخة الأداة في سورس 12.1
          python3 system/tools/mkbootimg/mkbootimg.py \
            --kernel device/infinix/x6835b/kernel \
            --ramdisk out/target/product/x6835b/ramdisk.img \
            --base 0x40078000 \
            --ramdisk_offset 0x11080000 \
            --tags_offset 0x07080000 \
            --pagesize 2048 \
            --header_version 2 \
            -o ${GITHUB_WORKSPACE}/TWRP-v13-FINAL.img

          # 3. نسخ الرامديسك كاحتياط
          cp out/target/product/x6835b/ramdisk.img ${GITHUB_WORKSPACE}/ramdisk-recovery.img
        working-directory: .

      - name: Upload Final Files
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: |
            ${{ github.workspace }}/TWRP-v13-FINAL.img
            ${{ github.workspace }}/ramdisk-recovery.img
          name: TWRP-SUCCESS-A13-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: |
            مبارك! هذا هو ملف البوت المعدل (TWRP-v13-FINAL.img).
            الملف جاهز للتفليش عبر Fastboot.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
