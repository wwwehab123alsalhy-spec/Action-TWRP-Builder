name: TWRP-FINAL-SUCCESS-NO-LINKS

on:
  workflow_dispatch:

jobs:
  full_build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop pngcrush rsync zip zlib1g-dev libssl-dev python3 python3-pip

      - name: Sync Source
        run: |
          mkdir ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo && chmod a+x ~/bin/repo
          export PATH=$PATH:~/bin
          mkdir workspace && cd workspace
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Clone Device Tree
        run: |
          cd workspace
          git clone https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b-.git device/infinix/x6835b

      - name: Build Recovery
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          make recoveryimage -j$(nproc)

      - name: Packaging with Official Tools
        run: |
          cd workspace
          # تحميل أداة التفليف الرسمية من مصدر موثوق لا يتعطل
          wget https://raw.githubusercontent.com/osm0sis/mkbootimg/master/mkbootimg.py
          
          # دمج الكيرنال والرامديسك الجديد (الحقيقي) الذي تم بناؤه
          python3 mkbootimg.py \
            --kernel device/infinix/x6835b/kernel \
            --ramdisk out/target/product/x6835b/ramdisk.img \
            --base 0x00000000 \
            --pagesize 2048 \
            --header_version 2 \
            -o TWRP-X6835B-REAL-FINAL.img
          
          cp TWRP-X6835B-REAL-FINAL.img ${GITHUB_WORKSPACE}/

      - name: Release Final Recovery
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-REAL-FINAL.img
          name: TWRP-OFFICIAL-SUCCESS-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-success
          body: "هذا هو الريكوفري الحقيقي المدمج بأدوات رسمية، يحتوي على توقيع ANDROID! وجاهز للتفليش."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
