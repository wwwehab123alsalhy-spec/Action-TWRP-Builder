name: TWRP-BOOT-INTEGRATED-X6835B

on:
  workflow_dispatch:

jobs:
  build_boot:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync and Build
        run: |
          sudo apt update && sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop pngcrush rsync zip zlib1g-dev libssl-dev
          mkdir ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo && chmod a+x ~/bin/repo
          export PATH=$PATH:~/bin
          mkdir workspace && cd workspace
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags
          git clone https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b-.git device/infinix/x6835b
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          # بناء ملف البوت المدمج بدلاً من ريكوفري منفصل
          make bootimage -j$(nproc)

      - name: Final Search and Label
        run: |
          cd workspace
          # البحث عن ملف البوت الناتج الذي يحتوي على الريكوفري مدمجاً
          find out/target/product/x6835b/ -name "boot.img" -exec cp {} ${GITHUB_WORKSPACE}/TWRP-IN-BOOT-X6835B.img \;
          ls -lh ${GITHUB_WORKSPACE}/TWRP-IN-BOOT-X6835B.img

      - name: Release Integrated Boot
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-IN-BOOT-X6835B.img
          name: TWRP-BOOT-X6835B-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-boot
          body: |
            هذا الملف هو Boot Image يحتوي على TWRP مدمجاً.
            طريقة التفليش: fastboot flash boot TWRP-IN-BOOT-X6835B.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
