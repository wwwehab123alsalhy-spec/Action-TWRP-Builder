name: Recovery Build FINAL RAMDISK FIX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Building recovery (Emergency Ramdisk Fix)
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          
          # تنظيف قسري للمجلد المسبب للفشل في السطر 16829
          rm -rf out/target/product/x6835b/recovery/root/vendor
          rm -rf out/target/product/x6835b/root/vendor
          
          # محاولة البناء مع تجاهل الخطأ في حال حدوثه لاستخراج الملفات الجزئية
          make recoveryimage -j$(nproc --all) || echo "Build stopped but checking for files..."
          
          # استخراج الملفات من قلب السيرفر ومن مجلدات الـ intermediates
          find out/target/product/x6835b/ -name "recovery.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;
          find out/target/product/x6835b/ -name "boot.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;
          find out/target/product/x6835b/obj/PACKAGING/ -name "ramdisk.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;
        working-directory: .

      - name: Upload Result
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/*.img
          name: TWRP-FINAL-RECOVERY-SUCCESS-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: "إذا ظهر boot.img أو recovery.img، فقد نجحت المهمة."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
