name: TWRP-MAGISKBOOT-REPACK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip wget

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Build Ramdisk and Repack
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          
          # 1. بناء الرامديسك أولاً
          make ramdisk -j$(nproc --all)

          # 2. تحميل أداة MagiskBoot للدمج الاحترافي
          wget https://github.com/tiann/KernelSU/raw/main/scripts/magiskboot -O magiskboot
          chmod +x magiskboot

          # 3. تجهيز الملفات
          cp device/infinix/x6835b/kernel ./kernel-official
          cp out/target/product/x6835b/ramdisk.img ./ramdisk.cpio

          # 4. محاولة الدمج باستخدام MagiskBoot
          # هذه الطريقة تتخطى أخطاء الـ DTB وتنتج ملفاً بالحجم الكامل
          ./magiskboot build TWRP-FIXED.img kernel-official ramdisk.cpio || echo "Build failed, trying repack mode..."
          
          if [ ! -f TWRP-FIXED.img ] || [ $(stat -c%s TWRP-FIXED.img) -lt 1000000 ]; then
             # محاولة ثانية بتنسيق مختلف إذا فشلت الأولى
             ./magiskboot repack kernel-official TWRP-FIXED.img || true
          fi

          # نقل الملف للسطح الخارجي للرفع
          cp TWRP-FIXED.img ${GITHUB_WORKSPACE}/TWRP-v13-REAL-SIZE.img
          
          # التأكد من الحجم في السجلات
          ls -lh ${GITHUB_WORKSPACE}/TWRP-v13-REAL-SIZE.img
        working-directory: .

      - name: Upload Final Image
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: |
            ${{ github.workspace }}/TWRP-v13-REAL-SIZE.img
          name: TWRP-FINAL-REAL-SIZE-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-final
          body: |
            هذا الملف تم دمجه بواسطة MagiskBoot لتجنب مشكلة الـ 1 كيلوبايت.
            تحذير: إذا وجدته أقل من 10 ميجابايت فلا تفلشه.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
