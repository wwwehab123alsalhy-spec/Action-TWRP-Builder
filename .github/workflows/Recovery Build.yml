name: TWRP-X6835B-DEEP-CLEAN-BUILD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop pngcrush rsync zip zlib1g-dev libssl-dev

      - name: Sync Source
        run: |
          mkdir ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo && chmod a+x ~/bin/repo
          export PATH=$PATH:~/bin
          mkdir workspace && cd workspace
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Clone and Force Clean Tree
        run: |
          cd workspace
          git clone https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b-.git device/infinix/x6835b
          
          # الخطوة السحرية: تنظيف المجلدات التي تسبب خطأ الـ Symlink
          echo "Cleaning problematic directories..."
          rm -rf device/infinix/x6835b/recovery/root/vendor
          rm -rf device/infinix/x6835b/recovery/root/system
          rm -rf device/infinix/x6835b/recovery/root/odm

      - name: Build Boot Image
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          # بناء البوت المدمج
          make bootimage -j$(nproc)

      - name: Final Package
        run: |
          # البحث عن الملف الناتج
          FILE=$(find workspace/out/target/product/x6835b/ -name "boot.img" | head -n 1)
          if [ -z "$FILE" ]; then echo "Boot image not found"; exit 1; fi
          cp $FILE TWRP-X6835B-BOOT-FINAL.img
          # تكبير الحجم لـ 32MB لضمان التوافق مع انفنكس
          truncate -s 32M TWRP-X6835B-BOOT-FINAL.img

      - name: Release Image
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-BOOT-FINAL.img
          name: TWRP-FINAL-SUCCESS-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-success
          body: "تم حل مشكلة الـ Symlink وتجاوز نسبة 99% بنجاح."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
