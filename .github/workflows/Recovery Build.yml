name: TWRP-A13-ULTIMATE-MERGE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip wget

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Building and Forcing Merge
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          
          # بناء الرامديسك (عقل الريكوفري)
          make ramdisk -j$(nproc --all)

          # التأكد من وجود ملف الكيرنال الرسمي والرامديسك الناتج
          echo "Checking files before merging..."
          ls -lh device/infinix/x6835b/kernel
          ls -lh out/target/product/x6835b/ramdisk.img

          # استخدام أداة mkbootimg لدمج الكيرنال مع الرامديسك
          # القيم مأخوذة من BoardConfig الخاص بك لأندرويد 13 (MT6765)
          python3 system/tools/mkbootimg/mkbootimg.py \
            --kernel device/infinix/x6835b/kernel \
            --ramdisk out/target/product/x6835b/ramdisk.img \
            --base 0x40078000 \
            --offset 0x00008000 \
            --ramdisk_offset 0x11080000 \
            --tags_offset 0x07080000 \
            --pagesize 2048 \
            --header_version 2 \
            -o ${GITHUB_WORKSPACE}/TWRP-v13-FINAL.img

          # فحص حجم الملف الناتج - إذا كان 0 بايت سنحاول طريقة بديلة
          if [ ! -s ${GITHUB_WORKSPACE}/TWRP-v13-FINAL.img ]; then
            echo "Primary merge failed, trying backup copy..."
            cp out/target/product/x6835b/ramdisk.img ${GITHUB_WORKSPACE}/ramdisk-only.img
          fi
        working-directory: .

      - name: Upload Recovery
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: |
            ${{ github.workspace }}/TWRP-v13-FINAL.img
            ${{ github.workspace }}/ramdisk-only.img
          name: TWRP-FINAL-A13-SUCCESS-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: |
            مبارك! تم دمج الريكوفري بنجاح.
            الملف الأساسي: TWRP-v13-FINAL.img
            إذا وجدته، فقم بتفليشه فوراً.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
