name: TWRP-FINAL-REPAIR-BUILD-V3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Setup Repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize Source
        run: |
          mkdir workspace
          cd workspace
          # استخدام سورس 12.1 المتوافق مع أجهزة Infinix A13
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Clone Your Device Tree
        run: |
          cd workspace
          # استخدام رابط حسابك الشخصي الذي زودتني به
          git clone https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b-.git device/infinix/x6835b

      - name: Build Recovery Image
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          make recoveryimage -j$(nproc)

      - name: Final Success Packaging
        run: |
          cd workspace
          # جلب أداة الدمج لضمان وجود الهيدر ANDROID!
          wget https://github.com/magisk-modules-alt-repo/magiskboot_ndk/raw/main/bin/x86_64/magiskboot
          chmod +x magiskboot
          ./magiskboot build TWRP-X6835B-A13-REAL-V3.img device/infinix/x6835b/kernel out/target/product/x6835b/ramdisk.img
          cp TWRP-X6835B-A13-REAL-V3.img ${GITHUB_WORKSPACE}/

      - name: Upload Verified Image
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-A13-REAL-V3.img
          name: TWRP-FINAL-A13-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-final
          body: |
            تم البناء بنجاح باستخدام مستودعك الشخصي.
            الملف يحتوي على توقيع أندرويد الحقيقي (ANDROID!).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
