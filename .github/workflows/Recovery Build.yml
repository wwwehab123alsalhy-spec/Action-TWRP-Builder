name: TWRP-FINAL-FIX-REPACK

on:
  workflow_dispatch:

jobs:
  fix_and_repack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt update && sudo apt install -y python3 wget cpio
          # تحميل النسخة المستقرة والمباشرة من magiskboot
          wget https://github.com/magisk-modules-alt-repo/magiskboot_ndk/raw/main/bin/x86_64/magiskboot
          chmod +x magiskboot

      - name: Execute Smart Repack
        run: |
          # تحديد المسارات بناءً على ملفاتك
          KERNEL="device/infinix/x6835b/kernel"
          RAMDISK="out/target/product/x6835b/ramdisk.img"
          
          # عملية الدمج وإصلاح الترويسة (Header)
          ./magiskboot build TWRP-X6835B-FINAL.img $KERNEL $RAMDISK || ./magiskboot repack $KERNEL TWRP-X6835B-FINAL.img
          
          # فحص الحجم النهائي للتأكد من تجاوز مشكلة الـ 1KB
          ls -lh TWRP-X6835B-FINAL.img

      - name: Release Recovery
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-FINAL.img
          name: TWRP-SUCCESS-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-success
          body: |
            تم تجاوز خطأ الـ 404 بنجاح.
            هذا الملف يحتوي على الرامديسك المدمج بحجمه الكامل.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
