name: Recovery Build FINAL SUCCESS FIXED

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Building recovery (Force Symlinks Fix)
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          # اختيار الهدف الصحيح بناءً على ملفاتك الموثقة في الصور السابقة
          lunch twrp_x6835b-eng
          
          # الخطوة السحرية: تنظيف المجلدات التي سببت فشل ninja في محاولتك الأخيرة
          rm -rf out/target/product/x6835b/recovery/root/vendor
          rm -rf out/target/product/x6835b/root/vendor
          
          # إجبار بناء الـ Boot والـ Recovery معاً لتجاوز تعارض الملفات
          make bootimage recoveryimage -j$(nproc --all) || make bootimage -j$(nproc --all)
          
          # البحث عن الملفات الناتجة ونسخها للرفع
          find out/target/product/ -name "boot.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;
          find out/target/product/ -name "recovery.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;
          find out/target/product/ -name "twrp-*.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;
        working-directory: .

      - name: Upload Result
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/*.img
          name: TWRP-FINAL-IMAGE-READY-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: "إذا اكتمل البناء بنجاح، ستجد ملفات الـ img هنا. تذكر أن جهازك يستخدم Recovery inside Boot."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
