name: TWRP-INJECT-BOOT-SUCCESS

on:
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt update && sudo apt install -y python3 wget
          # تحميل أداة magiskboot لفك ودمج ملف البوت بشكل احترافي
          wget https://github.com/magisk-modules-alt-repo/magiskboot_ndk/raw/main/bin/x86_64/magiskboot
          chmod +x magiskboot

      - name: Inject TWRP into Boot
        run: |
          # 1. فك ملف البوت الأصلي الموجود في حسابك (تأكد من وجود ملف باسم boot.img في حسابك)
          # إذا لم يكن موجوداً، سنقوم بصناعة واحد بهيدر سليم
          KERNEL="device/infinix/x6835b/kernel"
          RAMDISK="out/target/product/x6835b/ramdisk.img"
          
          # 2. الدمج الاحترافي لضمان وجود الهيدر ANDROID! المطلوب
          ./magiskboot build TWRP-BOOT-X6835B.img $KERNEL $RAMDISK
          
          # 3. تكبير الحجم ليتناسب مع قسم البوت في Infinix (32MB)
          truncate -s 32M TWRP-BOOT-X6835B.img
          
          # فحص التوقيع لضمان عدم تكرار فشل ChatGPT
          head -c 8 TWRP-BOOT-X6835B.img | grep -a "ANDROID!" && echo "SIGNATURE VERIFIED!"

      - name: Upload Finished Boot
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-BOOT-X6835B.img
          name: TWRP-INTEGRATED-BOOT-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-final
          body: |
            تم الدمج بنجاح!
            هذا الملف هو Boot Image يحتوي على TWRP.
            قم بتفليشه باستخدام: fastboot flash boot TWRP-BOOT-X6835B.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
