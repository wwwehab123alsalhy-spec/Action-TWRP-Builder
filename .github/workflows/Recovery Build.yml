name: Recovery Build FINAL FORCE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Building recovery (Full Forced Build)
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          # استخدام الاسم المطابق لصورك
          lunch twrp_x6835b-eng
          # أمر التنظيف العميق لمنع رسالة no work to do
          make clean && make mrproper
          # أمر بناء الريكوفري مع إجبار جلب التبعيات
          mka recoveryimage -j$(nproc --all)
          # سطر البحث النهائي في كل مكان
          find out/target/product/ -name "*.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;
        working-directory: .

      - name: Upload Result
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/*.img
          name: TWRP-FINAL-RECOVERY-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: "إذا لم يظهر الـ img الآن، فهناك نقص في ملف BoardConfig.mk داخل المستودع."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
