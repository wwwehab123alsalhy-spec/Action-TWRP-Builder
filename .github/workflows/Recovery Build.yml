name: TWRP-A13-AUTO-MERGE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Building and Manual Merging
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          
          # بناء الرامديسك أولاً (هذا الجزء ينجح دائماً عندك)
          make ramdisk -j$(nproc --all) || echo "Ramdisk built, continuing to merge..."

          # عملية الدمج القسري باستخدام الكيرنال الرسمي الخاص بك
          # نستخدم أداة mkbootimg الموجودة داخل سورس TWRP
          echo "Starting Manual Merge with Official Kernel..."
          python3 system/tools/mkbootimg/mkbootimg.py \
            --kernel device/infinix/x6835b/kernel \
            --ramdisk out/target/product/x6835b/ramdisk.img \
            --base 0x40078000 \
            --offset 0x00008000 \
            --ramdisk_offset 0x11080000 \
            --tags_offset 0x07080000 \
            --pagesize 2048 \
            --header_version 2 \
            -o ${GITHUB_WORKSPACE}/TWRP-v13-FINAL.img

          # التحقق من وجود الملف
          if [ -f ${GITHUB_WORKSPACE}/TWRP-v13-FINAL.img ]; then
            echo "Success! Recovery image created."
          else
            echo "Merge failed, checking for individual files..."
            cp out/target/product/x6835b/ramdisk.img ${GITHUB_WORKSPACE}/ || true
          fi
        working-directory: .

      - name: Upload Recovery Image
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: |
            ${{ github.workspace }}/*.img
          name: TWRP-FINAL-FOR-A13-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: |
            هذا هو الملف النهائي (TWRP-v13-FINAL.img).
            تم دمج الرامديسك (TWRP 12.1) مع الكيرنال الرسمي لأندرويد 13.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
