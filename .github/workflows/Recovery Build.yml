name: TWRP-REBOOT-TRUE-BUILD

on:
  workflow_dispatch:

jobs:
  full_build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparation
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop pngcrush rsync zip zlib1g-dev libssl-dev

      - name: Sync Source
        run: |
          mkdir ~/bin && curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo && chmod a+x ~/bin/repo
          export PATH=$PATH:~/bin
          mkdir workspace && cd workspace
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Clone Device Tree
        run: |
          cd workspace
          # استخدام رابط حسابك الشخصي الصحيح
          git clone https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b-.git device/infinix/x6835b

      - name: Build Recovery
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          # هذا هو الأمر الذي سيصنع الرامديسك الحقيقي (ANDROID!)
          make recoveryimage -j$(nproc)

      - name: Professional Packaging
        run: |
          cd workspace
          wget https://github.com/magisk-modules-alt-repo/magiskboot_ndk/raw/main/bin/x86_64/magiskboot
          chmod +x magiskboot
          # الدمج الرسمي باستخدام الكيرنال والرامديسك الجديد الموثوق
          ./magiskboot build TWRP-X6835B-REAL-V5.img device/infinix/x6835b/kernel out/target/product/x6835b/ramdisk.img
          cp TWRP-X6835B-REAL-V5.img ${GITHUB_WORKSPACE}/

      - name: Final Release
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-REAL-V5.img
          name: TWRP-REAL-FINAL-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-final
          body: "الملف الناتج الآن يحتوي على رامديسك حقيقي تم بناؤه من الصفر."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
