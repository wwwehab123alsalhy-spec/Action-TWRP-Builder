name: TWRP-FINAL-SUCCESS-FIX

on:
  workflow_dispatch:

jobs:
  fix_and_repack:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt update && sudo apt install -y python3 wget cpio
          # استخدام رابط مباشر وبديل لأداة magiskboot
          wget https://github.com/magisk-modules-alt-repo/magiskboot_ndk/raw/main/bin/x86_64/magiskboot -O magiskboot
          chmod +x magiskboot

      - name: Execute Smart Repack
        run: |
          KERNEL="device/infinix/x6835b/kernel"
          # استخدام الرامديسك الذي تم بناؤه مسبقاً
          RAMDISK="out/target/product/x6835b/ramdisk.img"
          
          # دمج الملفات لإنتاج ريكوفري كامل
          ./magiskboot build TWRP-X6835B-A13-SUCCESS.img $KERNEL $RAMDISK || ./magiskboot repack $KERNEL TWRP-X6835B-A13-SUCCESS.img
          
          echo "Final Size Check:"
          ls -lh TWRP-X6835B-A13-SUCCESS.img

      - name: Release Fixed Recovery
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-X6835B-A13-SUCCESS.img
          name: TWRP-X6835B-A13-FINAL-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-ok
          body: |
            مبارك! هذا هو الملف المصلح والنهائي.
            تم حل مشكلة الرابط 404 ودمج الملفات بنجاح.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
