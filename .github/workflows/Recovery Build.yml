name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/infinix/x6835b'
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'x6835b'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_x6835b'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recoveryimage'

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libssl-dev libxml2-utils git git-lfs python3 bc curl

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "NicoLYDX20"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
          # إضافة شجرة الجهاز يدوياً للمانيفست لضمان التحميل
          git clone https://github.com/nicolas-v/twrp_infinix_x6835b.git -b main ./${{ github.event.inputs.DEVICE_PATH }}
          repo sync -j$(nproc --all) --force-sync
        working-directory: .

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Building recovery
        run: |
          cd workspace
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng && make clean && make ${{ github.event.inputs.BUILD_TARGET }}
          # البحث والنسخ للمجلد الرئيسي
          find out/target/product/ -name "*.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/*.img
          name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: |
            Device: ${{ github.event.inputs.DEVICE_NAME }}
            Target: ${{ github.event.inputs.BUILD_TARGET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
