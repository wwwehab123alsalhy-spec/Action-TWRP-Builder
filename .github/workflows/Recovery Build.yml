name: TWRP-RAMDISK-VERIFY-AND-FIX

on:
  workflow_dispatch:

jobs:
  verify_and_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Ramdisk Content
        run: |
          RAMDISK="out/target/product/x6835b/ramdisk.img"
          
          if [ ! -f "$RAMDISK" ]; then
            echo "الخطأ: ملف الرامديسك غير موجود نهائياً في المسار!"
            exit 1
          fi

          # فحص إذا كان الملف يحتوي على بيانات (ليس أصفار فقط)
          SIZE=$(du -b "$RAMDISK" | cut -f1)
          if [ "$SIZE" -lt 10000 ]; then
            echo "التحذير: الملف حجمه صغير جداً ($SIZE بايت)، يبدو أنه فارغ فعلاً!"
            exit 1
          fi
          
          echo "الرامديسك يبدو سليماً بحجم: $SIZE بايت. جاري البدء بالدمج..."

      - name: Setup MagiskBoot
        run: |
          wget https://github.com/magisk-modules-alt-repo/magiskboot_ndk/raw/main/bin/x86_64/magiskboot
          chmod +x magiskboot

      - name: Build with Header Fix
        run: |
          KERNEL="device/infinix/x6835b/kernel"
          RAMDISK="out/target/product/x6835b/ramdisk.img"
          
          # استخدام magiskboot يضمن وضع توقيع ANDROID! الحقيقي
          ./magiskboot build TWRP-VERIFIED-V4.img $KERNEL $RAMDISK
          
          # حشو الملف ليكون 32MB ليتناسب مع Infinix
          truncate -s 32M TWRP-VERIFIED-V4.img
          
          # فحص نهائي لوجود التوقيع
          head -c 8 TWRP-VERIFIED-V4.img | grep -a "ANDROID!" && echo "Success: Android Signature Found!"

      - name: Release Verified Image
        uses: softprops/action-gh-release@v2
        with:
          files: TWRP-VERIFIED-V4.img
          name: TWRP-FINAL-CHECKED-${{ github.run_id }}
          tag_name: v${{ github.run_id }}-verified
          body: |
            تم فحص الرامديسك قبل الدمج.
            تم إضافة توقيع ANDROID! لضمان الإقلاع.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
