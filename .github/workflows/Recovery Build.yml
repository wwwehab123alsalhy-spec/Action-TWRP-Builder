name: TWRP-FINAL-BOOT-GENERATOR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Prepare environment
        run: |
          sudo apt update && sudo apt install -y build-essential git python3 curl zip unzip

      - name: Install repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: Initialize and Sync
        run: |
          mkdir workspace
          cd workspace
          export PATH="$HOME/bin:$PATH"
          git config --global user.name "wwwehab123alsalhy-spec"
          git config --global user.email "bl70420nc@gmail.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
        working-directory: .

      - name: Clone device tree
        run: |
          cd workspace
          git clone --depth=1 https://github.com/wwwehab123alsalhy-spec/android_device_infinix_x6835b- device/infinix/x6835b
        working-directory: .

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Building Recovery Boot Image
        run: |
          cd workspace
          source build/envsetup.sh
          # تفعيل خيارات التوافق لجهاز Infinix X6835B
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch twrp_x6835b-eng
          
          # مسح شامل لبدء بناء نظيف يدمج الكيرنال
          make clean
          
          # بناء الـ bootimage (الذي يحتوي على الريكوفري مدمجاً)
          # بما أنك حذفت سطر TARGET_RECOVERY_ROOT_OUT في BoardConfig، سينجح هذا الأمر
          make bootimage -j$(nproc --all)
          
          # نسخ الملفات الناتجة لمجلد الرفع
          echo "Copying generated files..."
          cp out/target/product/x6835b/boot.img ${GITHUB_WORKSPACE}/ || true
          cp out/target/product/x6835b/ramdisk-recovery.img ${GITHUB_WORKSPACE}/ || true
          
          # فحص إضافي للتأكد من وجود أي ملف img ناتج
          find out/target/product/x6835b/ -name "*.img" -exec cp {} ${GITHUB_WORKSPACE}/ \;
        working-directory: .

      - name: Upload Result
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: |
            ${{ github.workspace }}/*.img
          name: TWRP-READY-TO-FLASH-${{ github.run_id }}
          tag_name: v${{ github.run_id }}
          body: |
            مبارك! هذا هو ملف الريكوفري النهائي لجهاز Infinix Hot 30 Play.
            تم استخدام الكيرنال الرسمي المرفق في الـ Device Tree.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
